<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇宙星球跑酷</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
  #canvas { display: block; }

  /* ---- UI 覆盖层 ---- */
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  /* HUD */
  #hud {
    position: fixed; top: 20px; left: 0; width: 100%;
    display: flex; justify-content: space-between; padding: 0 30px;
    color: #fff; font-size: 18px; font-weight: bold; display: none;
    text-shadow: 0 0 10px #00d4ff, 0 0 20px #00d4ff;
  }
  #score-label { color: #00d4ff; }
  #speed-label { color: #a855f7; }

  /* 开始界面 */
  #start-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(0,20,60,0.9) 0%, rgba(0,0,20,0.97) 100%);
    pointer-events: all;
  }
  #start-screen h1 {
    font-size: clamp(36px, 6vw, 72px);
    background: linear-gradient(135deg, #00d4ff, #a855f7, #00d4ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    text-align: center; margin-bottom: 10px;
    filter: drop-shadow(0 0 20px #00d4ff);
    animation: titlePulse 2s ease-in-out infinite;
  }
  #start-screen p {
    color: #a0c4ff; font-size: clamp(14px, 2vw, 18px); margin-bottom: 40px;
    text-align: center; opacity: 0.8;
  }
  .btn {
    padding: 14px 48px; font-size: 18px; font-weight: bold; cursor: pointer;
    border: 2px solid #00d4ff; background: rgba(0, 212, 255, 0.1);
    color: #00d4ff; border-radius: 40px; pointer-events: all;
    transition: all 0.3s; text-shadow: 0 0 10px #00d4ff;
    box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.05);
    letter-spacing: 2px;
  }
  .btn:hover {
    background: rgba(0,212,255,0.25); box-shadow: 0 0 40px rgba(0,212,255,0.6), inset 0 0 30px rgba(0,212,255,0.1);
    transform: scale(1.05);
  }
  .controls-hint {
    position: absolute; bottom: 40px; color: rgba(160,196,255,0.6); font-size: 14px; text-align: center;
  }
  .controls-hint span { color: #00d4ff; }

  /* 结束界面 */
  #end-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(60,0,20,0.9) 0%, rgba(0,0,20,0.97) 100%);
    pointer-events: all;
  }
  #end-screen h2 {
    font-size: clamp(32px, 5vw, 60px); color: #ff4466;
    text-shadow: 0 0 30px #ff4466; margin-bottom: 20px;
    animation: shake 0.5s ease-in-out;
  }
  #final-score { font-size: clamp(20px, 3vw, 36px); color: #00d4ff; margin-bottom: 8px; }
  #high-score { font-size: 18px; color: #a855f7; margin-bottom: 40px; }
  #end-screen .btn { border-color: #ff4466; color: #ff4466; text-shadow: 0 0 10px #ff4466;
    box-shadow: 0 0 20px rgba(255,68,102,0.3); }
  #end-screen .btn:hover { background: rgba(255,68,102,0.2); box-shadow: 0 0 40px rgba(255,68,102,0.6); }

  /* 闪光提示 */
  #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255,50,50,0.15); pointer-events: none; opacity: 0; transition: opacity 0.1s; }

  /* 收集特效 */
  #collect-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,212,255,0.08); pointer-events: none; opacity: 0; transition: opacity 0.15s; }

  @keyframes titlePulse {
    0%,100% { filter: drop-shadow(0 0 20px #00d4ff); }
    50% { filter: drop-shadow(0 0 40px #a855f7) drop-shadow(0 0 60px #00d4ff); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div id="score-label">⭐ 得分: <span id="score-val">0</span></div>
  <div id="speed-label">🚀 速度: <span id="speed-val">1.0</span>x</div>
</div>
<div id="flash"></div>
<div id="collect-flash"></div>

<!-- 开始界面 -->
<div id="start-screen">
  <h1>🌌 宇宙星球跑酷</h1>
  <p>在无尽的星际轨道上，驾驭你的星球穿越障碍</p>
  <button class="btn" id="start-btn">开始冒险</button>
  <div class="controls-hint">
    <span>← →</span> 切换车道 &nbsp;|&nbsp; 躲避障碍 &nbsp;|&nbsp; 收集能量光点
  </div>
</div>

<!-- 结束界面 -->
<div id="end-screen">
  <h2>💥 星球碎裂</h2>
  <div id="final-score">本局得分: <span id="final-val">0</span></div>
  <div id="high-score">历史最高: <span id="best-val">0</span></div>
  <button class="btn" id="restart-btn">再次冒险</button>
</div>

<script>
// ==================== Three.js CDN 内联加载 ====================
(function() {
  // 使用 unpkg.com 加载 Three.js r128
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/three@0.128.0/build/three.min.js';
  script.onload = initGame;
  script.onerror = () => {
    // fallback
    const s2 = document.createElement('script');
    s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    s2.onload = initGame;
    document.head.appendChild(s2);
  };
  document.head.appendChild(script);
})();

// ==================== 游戏主体 ====================
function initGame() {

// ---------- 常量 ----------
const LANE_COUNT = 3;
const LANE_WIDTH = 2.8;
const LANE_POSITIONS = [-LANE_WIDTH, 0, LANE_WIDTH]; // x positions
const TRACK_SEGMENT_LEN = 14;
const TRACK_SEGMENTS = 24;
const BASE_SPEED = 0.16;
const BALL_RADIUS = 0.65;
const OBSTACLE_TYPES = ['cube', 'spike', 'wall'];

// ---------- 状态 ----------
let state = 'start'; // start | playing | dead
let score = 0;
let highScore = parseInt(localStorage.getItem('spaceRunnerHS') || '0');
let speed = BASE_SPEED;
let currentLane = 1; // 0,1,2
let targetLaneX = LANE_POSITIONS[1];
let laneTransitioning = false;
let distanceTraveled = 0;
let balls = []; // 拖尾
let obstacles = [];
let collectibles = [];
let trackSegments = [];
let particles = [];
let bgParticles = [];
let frameCount = 0;
let lastObstacleZ = -30;
let lastCollectibleZ = -22;
let alive = true;
let deathTimer = 0;
let shakeAmount = 0;
let laneSwapCooldown = 0;

// ---------- Three.js 初始化 ----------
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000510);
scene.fog = new THREE.FogExp2(0x000820, 0.022);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 4.5, 10);
camera.lookAt(0, 0, -8);

// ---------- 光源 ----------
const ambient = new THREE.AmbientLight(0x112244, 1.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0x4499ff, 2.5);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const neonLight1 = new THREE.PointLight(0x00d4ff, 3, 30);
neonLight1.position.set(0, 2, 0);
scene.add(neonLight1);

const neonLight2 = new THREE.PointLight(0xa855f7, 2, 25);
neonLight2.position.set(0, 1, -5);
scene.add(neonLight2);

// ---------- 工具函数 ----------
function lerp(a, b, t) { return a + (b - a) * t; }
function randRange(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(randRange(a, b + 1)); }

// ---------- 背景粒子 ----------
function createBgParticles() {
  const geo = new THREE.BufferGeometry();
  const count = 1800;
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  const colors = [
    [0.0, 0.83, 1.0],   // cyan
    [0.66, 0.33, 0.97], // purple
    [0.6, 0.8, 1.0],    // light blue
    [1.0, 0.9, 0.5],    // star yellow
    [0.3, 0.6, 1.0],    // blue
  ];
  for (let i = 0; i < count; i++) {
    pos[i*3]   = randRange(-80, 80);
    pos[i*3+1] = randRange(-40, 60);
    pos[i*3+2] = randRange(-150, 20);
    const c = colors[randInt(0, colors.length-1)];
    col[i*3] = c[0]; col[i*3+1] = c[1]; col[i*3+2] = c[2];
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.25, vertexColors: true, transparent: true, opacity: 0.85,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  bgParticles.push(pts);
}
createBgParticles();

// ---------- 轨道 ----------
function makeTrackSegment(zPos) {
  const group = new THREE.Group();

  // 主轨道平面（半透明）
  const planeGeo = new THREE.PlaneGeometry(LANE_WIDTH * LANE_COUNT + 1.5, TRACK_SEGMENT_LEN);
  const planeMat = new THREE.MeshStandardMaterial({
    color: 0x001840,
    transparent: true, opacity: 0.7,
    metalness: 0.8, roughness: 0.2,
    emissive: 0x001030, emissiveIntensity: 0.5,
  });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  plane.rotation.x = -Math.PI / 2;
  plane.position.z = -TRACK_SEGMENT_LEN / 2;
  group.add(plane);

  // 网格线
  const gridMat = new THREE.LineBasicMaterial({
    color: 0x0088cc, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending
  });
  // 横线
  for (let i = 0; i <= 6; i++) {
    const z = -i * (TRACK_SEGMENT_LEN / 6);
    const pts = [
      new THREE.Vector3(-LANE_WIDTH * 1.5 - 0.5, 0.01, z),
      new THREE.Vector3(LANE_WIDTH * 1.5 + 0.5, 0.01, z),
    ];
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    group.add(new THREE.Line(g, gridMat));
  }
  // 竖线（车道分割 + 边缘）
  const xLines = [-LANE_WIDTH * 1.5 - 0.5, -LANE_WIDTH * 0.5, LANE_WIDTH * 0.5, LANE_WIDTH * 1.5 + 0.5];
  xLines.forEach(x => {
    const pts = [
      new THREE.Vector3(x, 0.01, 0),
      new THREE.Vector3(x, 0.01, -TRACK_SEGMENT_LEN),
    ];
    const g = new THREE.BufferGeometry().setFromPoints(pts);
    group.add(new THREE.Line(g, gridMat));
  });

  // 边缘霓虹管（左右）
  [-1, 1].forEach(side => {
    const xEdge = side * (LANE_WIDTH * 1.5 + 0.3);
    // 主边缘线（亮）
    const edgePts = [
      new THREE.Vector3(xEdge, 0.05, 0),
      new THREE.Vector3(xEdge, 0.05, -TRACK_SEGMENT_LEN),
    ];
    const edgeGeo = new THREE.BufferGeometry().setFromPoints(edgePts);
    const edgeMat = new THREE.LineBasicMaterial({
      color: 0x00d4ff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, linewidth: 2
    });
    group.add(new THREE.Line(edgeGeo, edgeMat));

    // 晕光柱体
    const tubeGeo = new THREE.CylinderGeometry(0.06, 0.06, TRACK_SEGMENT_LEN, 6);
    const tubeMat = new THREE.MeshBasicMaterial({
      color: 0x00d4ff, transparent: true, opacity: 0.12, blending: THREE.AdditiveBlending
    });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    tube.position.set(xEdge, 0.3, -TRACK_SEGMENT_LEN / 2);
    group.add(tube);
  });

  group.position.z = zPos;
  scene.add(group);
  return { group, z: zPos };
}

function initTrack() {
  for (let i = 0; i < TRACK_SEGMENTS; i++) {
    trackSegments.push(makeTrackSegment(-i * TRACK_SEGMENT_LEN));
  }
}
initTrack();

// ---------- 玩家星球 ----------
const sphereGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);

// 自定义着色材质（模拟网格纹理）
const ballMat = new THREE.MeshStandardMaterial({
  color: 0x0055cc,
  emissive: 0x002299,
  emissiveIntensity: 0.8,
  metalness: 0.3,
  roughness: 0.45,
  wireframe: false,
});

const ball = new THREE.Mesh(sphereGeo, ballMat);
ball.position.set(LANE_POSITIONS[1], BALL_RADIUS, 0);
ball.castShadow = true;
scene.add(ball);

// 球体外圈wireframe（网格纹理）
const wireGeo = new THREE.SphereGeometry(BALL_RADIUS + 0.01, 16, 16);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x00aaff, wireframe: true, transparent: true, opacity: 0.3,
  blending: THREE.AdditiveBlending,
});
const wireMesh = new THREE.Mesh(wireGeo, wireMat);
ball.add(wireMesh);

// 星球光晕
const glowGeo = new THREE.SphereGeometry(BALL_RADIUS * 1.5, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x0066ff, transparent: true, opacity: 0.12,
  blending: THREE.AdditiveBlending, side: THREE.BackSide,
});
const glowMesh = new THREE.Mesh(glowGeo, glowMat);
ball.add(glowMesh);

// 内发光
const innerGlowGeo = new THREE.SphereGeometry(BALL_RADIUS * 1.2, 16, 16);
const innerGlowMat = new THREE.MeshBasicMaterial({
  color: 0x4488ff, transparent: true, opacity: 0.08,
  blending: THREE.AdditiveBlending, side: THREE.BackSide,
});
ball.add(new THREE.Mesh(innerGlowGeo, innerGlowMat));

// ---------- 拖尾粒子系统 ----------
const TRAIL_COUNT = 80;
const trailGeo = new THREE.BufferGeometry();
const trailPos = new Float32Array(TRAIL_COUNT * 3);
const trailColors = new Float32Array(TRAIL_COUNT * 3);
const trailSizes = new Float32Array(TRAIL_COUNT);
for (let i = 0; i < TRAIL_COUNT; i++) {
  trailPos[i*3] = 999; trailPos[i*3+1] = 999; trailPos[i*3+2] = 999;
  trailSizes[i] = 0;
  trailColors[i*3] = 0.0; trailColors[i*3+1] = 0.83; trailColors[i*3+2] = 1.0;
}
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPos, 3));
trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
trailGeo.setAttribute('size', new THREE.BufferAttribute(trailSizes, 1));
const trailMat = new THREE.PointsMaterial({
  size: 0.18, vertexColors: true, transparent: true, opacity: 0.7,
  blending: THREE.AdditiveBlending, depthWrite: false,
  sizeAttenuation: true,
});
const trailPoints = new THREE.Points(trailGeo, trailMat);
scene.add(trailPoints);
let trailIndex = 0;
let trailHistory = [];

// ---------- 障碍物 ----------
function createObstacle(zPos, laneIdx, type) {
  const group = new THREE.Group();
  const laneX = LANE_POSITIONS[laneIdx];

  if (type === 'cube') {
    const geo = new THREE.BoxGeometry(1.4, 1.4, 1.4);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xff2255, emissive: 0xaa0033, emissiveIntensity: 1.2,
      metalness: 0.6, roughness: 0.3,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.7;
    group.add(mesh);
    // 边框
    const edges = new THREE.EdgesGeometry(geo);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xff6688, blending: THREE.AdditiveBlending });
    const wireframe = new THREE.LineSegments(edges, lineMat);
    wireframe.position.y = 0.7;
    group.add(wireframe);
  } else if (type === 'spike') {
    // 尖刺：多个锥体
    [-0.4, 0, 0.4].forEach(dx => {
      const geo = new THREE.ConeGeometry(0.22, 1.5, 6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xff6600, emissive: 0xcc4400, emissiveIntensity: 1.5,
        metalness: 0.7, roughness: 0.2,
      });
      const cone = new THREE.Mesh(geo, mat);
      cone.position.set(dx, 0.75, 0);
      group.add(cone);
    });
  } else if (type === 'wall') {
    // 低矮宽墙
    const geo = new THREE.BoxGeometry(2.2, 0.8, 0.5);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xaa00ff, emissive: 0x6600aa, emissiveIntensity: 1.0,
      metalness: 0.5, roughness: 0.4, transparent: true, opacity: 0.88,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.y = 0.4;
    group.add(mesh);
    const edges = new THREE.EdgesGeometry(geo);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xcc44ff, blending: THREE.AdditiveBlending });
    const wf = new THREE.LineSegments(edges, lineMat);
    wf.position.y = 0.4;
    group.add(wf);
  }

  // 光源
  const light = new THREE.PointLight(type === 'wall' ? 0xaa00ff : (type === 'spike' ? 0xff6600 : 0xff2255), 1.5, 5);
  light.position.y = 1;
  group.add(light);

  group.position.set(laneX, 0, zPos);
  scene.add(group);
  return { group, lane: laneIdx, type, z: zPos, active: true };
}

// ---------- 收集光点 ----------
function createCollectible(zPos, laneIdx) {
  const group = new THREE.Group();
  const laneX = LANE_POSITIONS[laneIdx];

  // 核心球
  const geo = new THREE.SphereGeometry(0.22, 12, 12);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x00ffcc, emissive: 0x00ddaa, emissiveIntensity: 2.5,
    metalness: 0.0, roughness: 0.1,
  });
  const core = new THREE.Mesh(geo, mat);
  group.add(core);

  // 外层光晕
  const glowGeo = new THREE.SphereGeometry(0.38, 8, 8);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00ffcc, transparent: true, opacity: 0.15,
    blending: THREE.AdditiveBlending, side: THREE.BackSide,
  });
  group.add(new THREE.Mesh(glowGeo, glowMat));

  // 点光源
  const light = new THREE.PointLight(0x00ffcc, 1.5, 4);
  group.add(light);

  // 环形装饰
  const ringGeo = new THREE.TorusGeometry(0.35, 0.03, 6, 16);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.6 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  group.add(ring);

  group.position.set(laneX, BALL_RADIUS * 0.9, zPos);
  scene.add(group);
  return { group, lane: laneIdx, z: zPos, active: true };
}

// ---------- 爆炸粒子 ----------
let explosionParticles = [];
function createExplosion(pos) {
  const count = 60;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const velocities = [];
  for (let i = 0; i < count; i++) {
    positions[i*3] = pos.x; positions[i*3+1] = pos.y; positions[i*3+2] = pos.z;
    const r = Math.random(), g = Math.random() * 0.5, b = 1.0;
    colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
    velocities.push(new THREE.Vector3(
      (Math.random()-0.5) * 0.3,
      Math.random() * 0.25,
      (Math.random()-0.5) * 0.3
    ));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.15, vertexColors: true, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  explosionParticles.push({ pts, velocities, life: 1.0 });
}

// ---------- 收集闪光 ----------
let collectParticles = [];
function createCollectEffect(pos) {
  const count = 20;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = [];
  for (let i = 0; i < count; i++) {
    positions[i*3] = pos.x; positions[i*3+1] = pos.y; positions[i*3+2] = pos.z;
    velocities.push(new THREE.Vector3(
      (Math.random()-0.5) * 0.15,
      Math.random() * 0.18 + 0.05,
      (Math.random()-0.5) * 0.15
    ));
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.12, color: 0x00ffcc, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);
  collectParticles.push({ pts, velocities, life: 1.0 });
}

// ---------- 输入 ----------
const keys = {};
document.addEventListener('keydown', e => {
  if (!keys[e.key]) {
    keys[e.key] = true;
    if (state === 'playing') {
      if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && laneSwapCooldown <= 0) {
        if (currentLane > 0) {
          currentLane--;
          targetLaneX = LANE_POSITIONS[currentLane];
          laneSwapCooldown = 10;
        }
      }
      if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && laneSwapCooldown <= 0) {
        if (currentLane < LANE_COUNT - 1) {
          currentLane++;
          targetLaneX = LANE_POSITIONS[currentLane];
          laneSwapCooldown = 10;
        }
      }
    }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// 触摸支持
let touchStartX = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40) {
    if (dx < 0 && currentLane > 0 && laneSwapCooldown <= 0) {
      currentLane--; targetLaneX = LANE_POSITIONS[currentLane]; laneSwapCooldown = 10;
    } else if (dx > 0 && currentLane < LANE_COUNT - 1 && laneSwapCooldown <= 0) {
      currentLane++; targetLaneX = LANE_POSITIONS[currentLane]; laneSwapCooldown = 10;
    }
  }
}, { passive: true });

// ---------- UI 按钮 ----------
document.getElementById('start-btn').onclick = () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  startGame();
};
document.getElementById('restart-btn').onclick = () => {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  startGame();
};

function startGame() {
  // 清理旧状态
  obstacles.forEach(o => scene.remove(o.group));
  collectibles.forEach(c => scene.remove(c.group));
  explosionParticles.forEach(p => scene.remove(p.pts));
  collectParticles.forEach(p => scene.remove(p.pts));
  obstacles = []; collectibles = [];
  explosionParticles = []; collectParticles = [];
  trailHistory = [];

  score = 0; speed = BASE_SPEED;
  currentLane = 1; targetLaneX = LANE_POSITIONS[1];
  distanceTraveled = 0; frameCount = 0;
  alive = true; deathTimer = 0; shakeAmount = 0; laneSwapCooldown = 0;
  lastObstacleZ = -30; lastCollectibleZ = -22;

  ball.position.set(LANE_POSITIONS[1], BALL_RADIUS, 0);
  ball.scale.set(1,1,1);
  ball.visible = true;

  document.getElementById('score-val').textContent = '0';
  document.getElementById('speed-val').textContent = '1.0';
  updateBestDisplay();

  state = 'playing';
}

function updateBestDisplay() {
  document.getElementById('best-val').textContent = highScore;
}

function endGame() {
  state = 'dead';
  alive = false;
  createExplosion(ball.position.clone());
  ball.visible = false;
  shakeAmount = 15;

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('spaceRunnerHS', highScore);
  }

  // 红色闪光
  const fl = document.getElementById('flash');
  fl.style.opacity = '1';
  setTimeout(() => { fl.style.opacity = '0'; }, 200);

  setTimeout(() => {
    document.getElementById('final-val').textContent = score;
    document.getElementById('best-val').textContent = highScore;
    document.getElementById('end-screen').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    state = 'gameover';
  }, 1200);
}

// ---------- 碰撞检测 ----------
function checkCollisions() {
  const bx = ball.position.x, bz = ball.position.z;
  const hitR = BALL_RADIUS + 0.3;

  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    if (!o.active) continue;
    const dx = Math.abs(bx - o.group.position.x);
    const dz = Math.abs(bz - o.group.position.z);
    if (dx < hitR && dz < 0.8) {
      endGame();
      return;
    }
  }

  const collectR = BALL_RADIUS + 0.4;
  for (let i = collectibles.length - 1; i >= 0; i--) {
    const c = collectibles[i];
    if (!c.active) continue;
    const dx = Math.abs(bx - c.group.position.x);
    const dz = Math.abs(bz - c.group.position.z);
    if (dx < collectR && dz < 0.8) {
      c.active = false;
      scene.remove(c.group);
      collectibles.splice(i, 1);
      score += 10;
      document.getElementById('score-val').textContent = score;
      createCollectEffect(c.group.position.clone());
      // 收集闪光
      const cf = document.getElementById('collect-flash');
      cf.style.opacity = '1';
      setTimeout(() => { cf.style.opacity = '0'; }, 200);
    }
  }
}

// ---------- 更新轨道 ----------
function updateTrack() {
  // 第一遍：所有段前移，同时找最远（z最小）的段
  let farthestZ = 0;
  let farthestSeg = trackSegments[0];
  for (let i = 0; i < trackSegments.length; i++) {
    const seg = trackSegments[i];
    seg.group.position.z += speed;
    if (seg.group.position.z < farthestZ) {
      farthestZ = seg.group.position.z;
      farthestSeg = seg;
    }
  }
  // 第二遍：检测越出视野的段，无缝衔接到最前方
  for (let i = 0; i < trackSegments.length; i++) {
    const seg = trackSegments[i];
    if (seg.group.position.z > TRACK_SEGMENT_LEN * 1.5) {
      // 无间隙回收：该段放到最远段的前面
      seg.group.position.z = farthestZ - TRACK_SEGMENT_LEN;
      // 更新最远段引用
      if (seg.group.position.z < farthestZ) {
        farthestZ = seg.group.position.z;
        farthestSeg = seg;
      }
    }
  }
}

// ---------- 更新障碍物和收集物 ----------
function updateObstacles() {
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const o = obstacles[i];
    o.group.position.z += speed;
    // 旋转动画
    o.group.rotation.y += 0.015;
    if (o.group.position.z > 15) {
      scene.remove(o.group);
      obstacles.splice(i, 1);
    }
  }
  for (let i = collectibles.length - 1; i >= 0; i--) {
    const c = collectibles[i];
    c.group.position.z += speed;
    // 悬浮旋转
    c.group.rotation.y += 0.04;
    c.group.position.y = BALL_RADIUS * 0.9 + Math.sin(frameCount * 0.05 + i) * 0.12;
    if (c.group.position.z > 15) {
      scene.remove(c.group);
      collectibles.splice(i, 1);
    }
  }
}

// ---------- 生成新障碍物/收集物 ----------
function spawnObjects() {
  const spawnZ = -55;
  // 障碍物：每隔一定距离生成
  const obstInterval = Math.max(11, 25 - score / 45);
  if (lastObstacleZ > spawnZ + obstInterval) {
    // 随机选1~2条车道放障碍
    const laneIndices = [0,1,2];
    let usedLanes = [];
    const numObs = score > 200 ? (Math.random() < 0.25 ? 2 : 1) : 1;
    for (let n = 0; n < numObs; n++) {
      const remaining = laneIndices.filter(l => !usedLanes.includes(l));
      if (remaining.length === 0) break;
      const laneIdx = remaining[randInt(0, remaining.length-1)];
      usedLanes.push(laneIdx);
      const type = OBSTACLE_TYPES[randInt(0, OBSTACLE_TYPES.length-1)];
      obstacles.push(createObstacle(spawnZ, laneIdx, type));
    }
    lastObstacleZ = spawnZ;
  } else {
    lastObstacleZ += speed;
  }

  // 收集物：随机生成
  const collectInterval = Math.max(6, 14 - score / 50);
  if (lastCollectibleZ > spawnZ + collectInterval) {
    const laneIdx = randInt(0, 2);
    collectibles.push(createCollectible(spawnZ + randRange(1, 5), laneIdx));
    lastCollectibleZ = spawnZ;
  } else {
    lastCollectibleZ += speed;
  }
}

// ---------- 更新拖尾 ----------
function updateTrail() {
  if (!alive) return;
  trailHistory.unshift({ x: ball.position.x, y: ball.position.y, z: ball.position.z });
  if (trailHistory.length > TRAIL_COUNT) trailHistory.pop();

  const pos = trailGeo.attributes.position.array;
  const col = trailColors;
  for (let i = 0; i < TRAIL_COUNT; i++) {
    if (i < trailHistory.length) {
      const t = trailHistory[i];
      pos[i*3] = t.x; pos[i*3+1] = t.y; pos[i*3+2] = t.z;
      const alpha = 1 - i / TRAIL_COUNT;
      // 从青蓝渐变为紫
      col[i*3]   = lerp(0, 0.66, i/TRAIL_COUNT);
      col[i*3+1] = lerp(0.83, 0.2, i/TRAIL_COUNT);
      col[i*3+2] = 1.0;
    } else {
      pos[i*3] = 999; pos[i*3+1] = 999; pos[i*3+2] = 999;
    }
  }
  trailGeo.attributes.position.needsUpdate = true;
  trailGeo.attributes.color.needsUpdate = true;
}

// ---------- 更新爆炸粒子 ----------
function updateExplosions(dt) {
  for (let i = explosionParticles.length - 1; i >= 0; i--) {
    const e = explosionParticles[i];
    e.life -= 0.03;
    if (e.life <= 0) {
      scene.remove(e.pts);
      explosionParticles.splice(i, 1);
      continue;
    }
    const pos = e.pts.geometry.attributes.position.array;
    const count = pos.length / 3;
    for (let j = 0; j < count; j++) {
      pos[j*3] += e.velocities[j].x;
      pos[j*3+1] += e.velocities[j].y;
      pos[j*3+2] += e.velocities[j].z;
      e.velocities[j].y -= 0.008;
    }
    e.pts.geometry.attributes.position.needsUpdate = true;
    e.pts.material.opacity = e.life;
  }
  for (let i = collectParticles.length - 1; i >= 0; i--) {
    const c = collectParticles[i];
    c.life -= 0.05;
    if (c.life <= 0) {
      scene.remove(c.pts);
      collectParticles.splice(i, 1);
      continue;
    }
    const pos = c.pts.geometry.attributes.position.array;
    const count = pos.length / 3;
    for (let j = 0; j < count; j++) {
      pos[j*3] += c.velocities[j].x;
      pos[j*3+1] += c.velocities[j].y;
      pos[j*3+2] += c.velocities[j].z;
    }
    c.pts.geometry.attributes.position.needsUpdate = true;
    c.pts.material.opacity = c.life;
  }
}

// ---------- 难度 ----------
function updateDifficulty() {
  speed = BASE_SPEED + score * 0.00045;
  speed = Math.min(speed, BASE_SPEED * 3);
  document.getElementById('speed-val').textContent = (speed / BASE_SPEED).toFixed(1);
}

// ---------- 动态光效 ----------
function updateLights() {
  const t = frameCount * 0.02;
  neonLight1.position.x = Math.sin(t) * 3;
  neonLight1.intensity = 2.5 + Math.sin(t * 2.3) * 0.8;
  neonLight2.intensity = 2 + Math.cos(t * 1.7) * 0.6;
  if (alive) {
    neonLight1.position.set(ball.position.x, ball.position.y + 1.5, ball.position.z);
    neonLight2.position.set(ball.position.x, ball.position.y + 0.5, ball.position.z - 2);
  }
}

// ---------- 相机震动 ----------
function updateCamera() {
  let shakeX = 0, shakeY = 0;
  if (shakeAmount > 0) {
    shakeX = (Math.random() - 0.5) * shakeAmount * 0.06;
    shakeY = (Math.random() - 0.5) * shakeAmount * 0.04;
    shakeAmount -= 0.8;
    if (shakeAmount < 0) shakeAmount = 0;
  }
  camera.position.x = lerp(camera.position.x, ball.position.x * 0.25 + shakeX, 0.08);
  camera.position.y = 4.5 + shakeY;
  camera.lookAt(ball.position.x * 0.1, 0, -8);
}

// ---------- 背景粒子漂移 ----------
function updateBgParticles() {
  bgParticles.forEach(pts => {
    const pos = pts.geometry.attributes.position.array;
    for (let i = 0; i < pos.length / 3; i++) {
      pos[i*3+2] += speed * 0.3;
      if (pos[i*3+2] > 25) {
        pos[i*3+2] = -150;
        pos[i*3] = randRange(-80, 80);
        pos[i*3+1] = randRange(-40, 60);
      }
    }
    pts.geometry.attributes.position.needsUpdate = true;
  });
}

// ---------- 主循环 ----------
let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  frameCount++;

  if (state === 'playing') {
    // 分数递增（距离）
    distanceTraveled += speed;
    if (frameCount % 6 === 0) {
      score++;
      document.getElementById('score-val').textContent = score;
    }

    // 星球横向移动
    ball.position.x = lerp(ball.position.x, targetLaneX, 0.22);

    // 滚动
    const rollSpeed = speed * 6;
    ball.rotation.x -= rollSpeed;
    ball.rotation.z = (targetLaneX - ball.position.x) * 0.3;

    // 轻微浮动
    ball.position.y = BALL_RADIUS + Math.sin(frameCount * 0.08) * 0.04;

    // 内发光脉冲
    glowMesh.material.opacity = 0.1 + Math.sin(frameCount * 0.1) * 0.05;

    if (laneSwapCooldown > 0) laneSwapCooldown--;

    updateTrack();
    updateObstacles();
    spawnObjects();
    checkCollisions();
    updateTrail();
    updateDifficulty();
    updateLights();
    updateCamera();
    updateBgParticles();
    updateExplosions(dt);

  } else if (state === 'dead') {
    deathTimer++;
    updateExplosions(dt);
    updateCamera();
  } else if (state === 'start' || state === 'gameover') {
    // 轨道慢速演示
    updateTrack(); // 复用主循环，保持一致
    updateBgParticles();
    updateExplosions(dt);
    // 相机慢慢摆动
    camera.position.x = Math.sin(frameCount * 0.008) * 1.5;
    camera.lookAt(0, 0, -8);
  }

  renderer.render(scene, camera);
}

animate();

// ---------- 响应式 ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} // end initGame
</script>
