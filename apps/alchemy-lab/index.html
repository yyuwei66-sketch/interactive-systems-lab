<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech工坊 · 炼金解谜</title>
<style>
  :root {
    --wood-dark: #2a1810;
    --wood-mid: #4a2e1a;
    --wood-light: #6b3d20;
    --brass: #c9a84c;
    --brass-dark: #8a6d2b;
    --brass-light: #e8cc6e;
    --parchment: #e8d5b7;
    --parchment-dark: #c4a882;
    --ink: #2c1810;
    --glow-blue: #4fc3f7;
    --glow-purple: #ce93d8;
    --glow-gold: #ffd54f;
    --glow-green: #81c784;
    --glow-red: #ef5350;
    --glow-orange: #ff8a65;
    --bg-lab: #1a0e08;
    --text-light: #e0d0b8;
    --text-dim: #9a8a72;
    --panel-bg: rgba(30,18,10,0.92);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--bg-lab);
    color: var(--text-light);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }
  #game-container {
    display: grid;
    grid-template-columns: 240px 1fr 280px;
    grid-template-rows: 60px 1fr 120px;
    height: 100vh;
    gap: 0;
  }

  /* ── Top Bar ── */
  #top-bar {
    grid-column: 1 / -1;
    background: linear-gradient(180deg, #1e120a 0%, #2a1810 100%);
    border-bottom: 2px solid var(--brass-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 10;
  }
  #top-bar h1 {
    font-size: 22px;
    color: var(--brass-light);
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(201,168,76,0.4);
  }
  #stage-indicator {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  #stage-indicator span { color: var(--brass); font-weight: bold; }

  /* ── Left Panel: Materials ── */
  #materials-panel {
    background: var(--panel-bg);
    border-right: 2px solid var(--brass-dark);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-title {
    padding: 12px 16px;
    font-size: 15px;
    color: var(--brass);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--brass-dark);
    text-align: center;
    text-shadow: 0 0 8px rgba(201,168,76,0.3);
  }
  #materials-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  #materials-list::-webkit-scrollbar { width: 6px; }
  #materials-list::-webkit-scrollbar-thumb { background: var(--brass-dark); border-radius: 3px; }
  .material-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.25s;
    border: 1px solid transparent;
    position: relative;
  }
  .material-item:hover {
    background: rgba(201,168,76,0.12);
    border-color: var(--brass-dark);
  }
  .material-item.locked {
    opacity: 0.35;
    cursor: not-allowed;
    filter: grayscale(0.8);
  }
  .material-item.selected {
    border-color: var(--brass);
    background: rgba(201,168,76,0.18);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }
  .mat-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3);
  }
  .mat-name { font-size: 13px; color: var(--text-light); }
  .mat-desc { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .mat-locked-label {
    position: absolute; top:4px; right:8px;
    font-size:9px; color:var(--glow-red);
  }

  /* ── Center: Lab Area ── */
  #lab-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 80%, rgba(60,30,10,0.5) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 30%, rgba(40,20,5,0.3) 0%, transparent 50%),
      linear-gradient(180deg, #120a04 0%, #1e120a 40%, #251810 100%);
    overflow: hidden;
  }
  /* Background dust particles */
  #dust-canvas {
    position: absolute; top:0; left:0; width:100%; height:100%;
    pointer-events: none; z-index: 0;
  }

  /* ── Cauldron ── */
  #cauldron-area {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 10px;
  }
  #cauldron-wrapper {
    position: relative;
    width: 220px;
    height: 200px;
  }
  #cauldron-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 140px;
    background: linear-gradient(135deg, #3a3a3a 0%, #222 50%, #1a1a1a 100%);
    border-radius: 0 0 90px 90px;
    border: 3px solid #555;
    border-top: 4px solid var(--brass-dark);
    box-shadow:
      inset 0 -20px 30px rgba(0,0,0,0.6),
      inset 0 10px 20px rgba(0,0,0,0.3),
      0 4px 20px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  #cauldron-rim {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 20px;
    background: linear-gradient(180deg, var(--brass-light) 0%, var(--brass) 30%, var(--brass-dark) 100%);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 -2px 4px rgba(0,0,0,0.3);
    z-index: 3;
  }
  /* Handles */
  .cauldron-handle {
    position: absolute;
    top: 20px;
    width: 30px;
    height: 40px;
    border: 4px solid var(--brass-dark);
    border-radius: 0 0 15px 15px;
    border-top: none;
    z-index: 2;
  }
  .cauldron-handle.left { left: 2px; border-right: none; }
  .cauldron-handle.right { right: 2px; border-left: none; }

  /* Liquid in cauldron */
  #cauldron-liquid {
    position: absolute;
    bottom: 3px;
    left: 3px;
    right: 3px;
    height: 70%;
    border-radius: 0 0 85px 85px;
    transition: background 1.5s ease, box-shadow 1.5s ease;
    background: rgba(30,30,50,0.6);
    overflow: hidden;
  }
  #cauldron-liquid::before {
    content: '';
    position: absolute;
    top: -5px;
    left: -5px;
    right: -5px;
    height: 20px;
    background: inherit;
    border-radius: 50%;
    opacity: 0.6;
    filter: brightness(1.3);
  }

  /* Bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,255,255,0.15);
    animation: bubbleRise linear forwards;
  }
  @keyframes bubbleRise {
    0% { transform: translateY(0) scale(1); opacity: 0.7; }
    50% { opacity: 0.5; }
    100% { transform: translateY(-120px) scale(0.3); opacity: 0; }
  }

  /* Glow effect under cauldron */
  #cauldron-glow {
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 40px;
    border-radius: 50%;
    background: rgba(79,195,247,0.15);
    filter: blur(15px);
    transition: background 1.5s ease;
    z-index: 1;
  }

  /* Fire under cauldron */
  #fire-container {
    position: absolute;
    bottom: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 40px;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.8s;
  }
  #fire-container.active { opacity: 1; }
  .flame {
    position: absolute;
    bottom: 0;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 0.3s ease-in-out infinite alternate;
  }
  @keyframes flicker {
    0% { transform: scaleX(1) scaleY(1) rotate(-2deg); }
    100% { transform: scaleX(0.9) scaleY(1.1) rotate(2deg); }
  }
  .flame-1 {
    left: 20px; width: 20px; height: 35px;
    background: linear-gradient(0deg, #ff6b35, #ffc107);
    animation-delay: 0s;
  }
  .flame-2 {
    left: 38px; width: 24px; height: 40px;
    background: linear-gradient(0deg, #ff6b35, #ffeb3b);
    animation-delay: 0.1s;
  }
  .flame-3 {
    left: 55px; width: 18px; height: 30px;
    background: linear-gradient(0deg, #ff6b35, #ffc107);
    animation-delay: 0.2s;
  }

  /* Smoke */
  .smoke-particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(150,150,150,0.3);
    filter: blur(8px);
    animation: smokeRise 2s ease-out forwards;
  }
  @keyframes smokeRise {
    0% { transform: translateY(0) scale(0.5); opacity: 0.5; }
    100% { transform: translateY(-80px) scale(2); opacity: 0; }
  }

  /* Explosion */
  .explosion-particle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: explode 0.8s ease-out forwards;
  }
  @keyframes explode {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }

  /* Stir animation */
  #stir-indicator {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 80px;
    height: 80px;
    margin: -40px 0 0 -40px;
    border: 3px solid transparent;
    border-top-color: var(--brass);
    border-radius: 50%;
    opacity: 0;
    z-index: 5;
  }
  #stir-indicator.stirring {
    animation: stir 0.6s linear 2;
    opacity: 1;
  }
  @keyframes stir {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ── Controls ── */
  #controls {
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 3;
    margin-top: 5px;
  }
  .ctrl-btn {
    padding: 8px 18px;
    background: linear-gradient(180deg, var(--brass) 0%, var(--brass-dark) 100%);
    color: var(--ink);
    border: 2px solid var(--brass-light);
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    text-transform: uppercase;
  }
  .ctrl-btn:hover {
    background: linear-gradient(180deg, var(--brass-light) 0%, var(--brass) 100%);
    box-shadow: 0 0 12px rgba(201,168,76,0.4);
  }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  #temp-control {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .temp-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--brass-dark);
    background: rgba(30,18,10,0.8);
    color: var(--text-light);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .temp-btn:hover { border-color: var(--brass); }
  #temp-display {
    min-width: 70px;
    text-align: center;
    font-size: 13px;
    color: var(--brass);
    letter-spacing: 1px;
  }
  #temp-display .temp-val {
    font-size: 18px;
    font-weight: bold;
  }

  /* ── Top HUD wrapper (objective bar + messages stacked vertically) ── */
  #top-hud {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 92%;
    max-width: 540px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }

  /* ── Message Log ── */
  #message-area {
    width: 100%;
    pointer-events: none;
  }
  .game-message {
    padding: 10px 18px;
    margin-bottom: 6px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    animation: msgFade 4s ease forwards;
    pointer-events: auto;
  }
  .game-message.success {
    background: rgba(129,199,132,0.2);
    border: 1px solid var(--glow-green);
    color: var(--glow-green);
    text-shadow: 0 0 6px rgba(129,199,132,0.4);
  }
  .game-message.failure {
    background: rgba(239,83,80,0.2);
    border: 1px solid var(--glow-red);
    color: var(--glow-red);
    text-shadow: 0 0 6px rgba(239,83,80,0.4);
  }
  .game-message.info {
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--brass);
    color: var(--brass-light);
    text-shadow: 0 0 6px rgba(201,168,76,0.3);
  }
  .game-message.hint {
    background: rgba(79,195,247,0.15);
    border: 1px solid var(--glow-blue);
    color: var(--glow-blue);
  }
  @keyframes msgFade {
    0% { opacity: 0; transform: translateY(-10px); }
    10% { opacity: 1; transform: translateY(0); }
    80% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── Right Panel: Journal ── */
  #journal-panel {
    background: var(--panel-bg);
    border-left: 2px solid var(--brass-dark);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #journal-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  #journal-content::-webkit-scrollbar { width: 6px; }
  #journal-content::-webkit-scrollbar-thumb { background: var(--brass-dark); border-radius: 3px; }
  .journal-entry {
    margin-bottom: 16px;
    padding: 14px;
    background: rgba(232,213,183,0.06);
    border: 1px solid rgba(196,168,130,0.2);
    border-radius: 6px;
  }
  .journal-entry.locked {
    opacity: 0.4;
    filter: grayscale(0.6);
  }
  .journal-entry-title {
    font-size: 13px;
    color: var(--brass);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .journal-entry-text {
    font-size: 12px;
    color: var(--parchment);
    line-height: 1.7;
    font-style: italic;
    opacity: 0.85;
  }
  .journal-entry-hint {
    font-size: 11px;
    color: var(--brass);
    margin-top: 8px;
    padding: 6px 10px;
    background: rgba(196,168,130,0.12);
    border-left: 2px solid var(--brass);
    border-radius: 0 4px 4px 0;
    font-style: normal;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }

  /* ── Bottom: Inventory ── */
  #inventory-panel {
    grid-column: 1 / -1;
    background: linear-gradient(0deg, #120a04 0%, var(--panel-bg) 100%);
    border-top: 2px solid var(--brass-dark);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
    z-index: 10;
  }
  #inv-label {
    font-size: 13px;
    color: var(--brass);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 6px;
    flex-shrink: 0;
  }
  #inv-slots {
    display: flex;
    gap: 8px;
    flex: 1;
    overflow-x: auto;
    padding: 8px 0;
  }
  #inv-slots::-webkit-scrollbar { height: 4px; }
  #inv-slots::-webkit-scrollbar-thumb { background: var(--brass-dark); border-radius: 2px; }
  .inv-slot {
    min-width: 70px;
    height: 70px;
    border: 2px solid var(--brass-dark);
    border-radius: 8px;
    background: rgba(30,18,10,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .inv-slot:hover {
    border-color: var(--brass);
    box-shadow: 0 0 10px rgba(201,168,76,0.2);
  }
  .inv-slot .inv-icon { font-size: 24px; }
  .inv-slot .inv-label {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 2px;
    text-align: center;
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .inv-slot.craftable {
    border-color: var(--glow-gold);
    box-shadow: 0 0 12px rgba(255,213,79,0.25);
    animation: invPulse 2s ease-in-out infinite;
  }
  .inv-slot.usable {
    border-color: var(--glow-blue);
    box-shadow: 0 0 12px rgba(79,195,247,0.3);
    animation: invPulse 1.5s ease-in-out infinite;
    cursor: pointer;
  }
  .inv-slot.usable .inv-label { color: var(--glow-blue); }
  @keyframes invPulse {
    0%,100% { box-shadow: 0 0 8px rgba(255,213,79,0.2); }
    50% { box-shadow: 0 0 18px rgba(255,213,79,0.4); }
  }
  .inv-slot.empty { opacity: 0.3; }

  /* ── Embedded Device (Stage 5, replaces overlay) ── */
  #device-area {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    gap: 16px;
  }
  #device-area.active { display: flex; }
  #device-title {
    font-size: 14px;
    color: var(--brass);
    letter-spacing: 2px;
  }
  #device-visual-embed {
    width: 260px; height: 260px;
    position: relative;
    flex-shrink: 0;
  }
  .device-ring {
    position: absolute;
    border: 3px solid var(--brass-dark);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    transition: all 1s;
  }
  .device-ring.r1 { width: 230px; height: 230px; }
  .device-ring.r2 { width: 165px; height: 165px; }
  .device-ring.r3 { width: 100px; height: 100px; }
  .device-ring.r4 { width: 40px; height: 40px; background: var(--brass-dark); }
  .device-ring.lit {
    border-color: var(--glow-gold);
    box-shadow: 0 0 20px rgba(255,213,79,0.5), inset 0 0 15px rgba(255,213,79,0.3);
  }
  .device-ring.r4.lit {
    background: var(--glow-gold);
    box-shadow: 0 0 40px rgba(255,213,79,0.8);
  }
  .device-slot {
    position: absolute;
    width: 46px; height: 46px;
    border: 2px dashed var(--brass-dark);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    line-height: 1.2;
    padding: 3px;
  }
  .device-slot.filled {
    border-style: solid;
    border-color: var(--glow-gold);
    background: rgba(201,168,76,0.2);
    color: var(--glow-gold);
    box-shadow: 0 0 8px rgba(255,213,79,0.25);
  }
  .device-slot:not(.filled):hover {
    border-color: var(--brass-light);
    background: rgba(201,168,76,0.1);
  }
  #device-status-embed {
    font-size: 13px;
    color: var(--brass);
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.6;
  }
  #device-slots-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 4px;
  }
  .device-slot-inline {
    width: 56px; height: 56px;
    border: 2px dashed var(--brass-dark);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.3s;
    gap: 2px;
    background: rgba(30,18,10,0.3);
  }
  .device-slot-inline .slot-num {
    font-size: 9px;
    opacity: 0.5;
  }
  .device-slot-inline .slot-icon {
    font-size: 20px;
  }
  .device-slot-inline .slot-name {
    font-size: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 54px;
  }
  .device-slot-inline.filled {
    border-style: solid;
    border-color: var(--glow-gold);
    background: rgba(201,168,76,0.15);
    color: var(--glow-gold);
    box-shadow: 0 0 8px rgba(255,213,79,0.25);
  }
  .device-slot-inline:not(.filled) {
    border-color: rgba(201,168,76,0.3);
  }
  .device-slot-inline:not(.filled):hover {
    border-color: var(--brass);
    background: rgba(201,168,76,0.08);
  }
  /* (device-panel removed - using embedded device-area) */

  /* ── Victory overlay ── */
  #victory-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #victory-overlay.active { display: flex; }
  #victory-text {
    font-size: 36px;
    color: var(--glow-gold);
    letter-spacing: 5px;
    text-shadow: 0 0 30px rgba(255,213,79,0.6);
    animation: victoryGlow 2s ease-in-out infinite alternate;

function renderMaterials() {
  const list = document.getElementById('materials-list');
  list.innerHTML = '';
  Object.values(MATERIALS).forEach(mat => {
    const unlocked = state.unlockedMaterials.includes(mat.id);
    const selected = state.selectedMaterial === mat.id;
    const stock = state.materialStock[mat.id] || 0;
    const outOfStock = unlocked && stock <= 0;
    const div = document.createElement('div');
    div.className = 'material-item' + (!unlocked || outOfStock ? ' locked' : '') + (selected ? ' selected' : '');
    div.innerHTML = `
      <div class="mat-icon" style="background:${mat.color}22; border:1px solid ${mat.color}55">${mat.icon}</div>
      <div>
        <div class="mat-name">${unlocked ? mat.name : '???'}</div>
        <div class="mat-desc">${unlocked ? (outOfStock ? '库存耗尽' : mat.desc) : '???'}</div>
      </div>
      ${!unlocked ? '<span class="mat-locked-label">🔒</span>' : ''}
      ${unlocked && !outOfStock ? '<span class="mat-locked-label" style="color:var(--brass);font-size:9px">x' + stock + '</span>' : ''}
      ${outOfStock ? '<span class="mat-locked-label" style="font-size:9px">✕</span>' : ''}
    `;
    if (unlocked && !outOfStock) {
      div.onclick = () => selectMaterial(mat.id);
      div.oncontextmenu = (e) => { e.preventDefault(); showInspect(e, mat.name, mat.desc + (stock <= 2 ? ' [仅剩' + stock + '份]' : '')); };
    }
    list.appendChild(div);
  });
}

function renderJournal() {
  const cont = document.getElementById('journal-content');
  cont.innerHTML = '';
  JOURNAL_ENTRIES.forEach((entry, i) => {
    const unlocked = i === 0 || state.journalUnlocked.includes(i);
    const div = document.createElement('div');
    div.className = 'journal-entry' + (unlocked ? '' : ' locked');
    div.innerHTML = `
      <div class="journal-entry-title">${unlocked ? entry.title : '🔒 ???'}</div>
      ${unlocked ? `<div class="journal-entry-text">"${entry.text}"</div>` +
        (entry.hint ? `<div class="journal-entry-hint">💭 ${entry.hint}</div>` : '') : ''}
    `;
    cont.appendChild(div);
  });
  // Scroll to bottom to show latest
  cont.scrollTop = cont.scrollHeight;
}

function renderInventory() {
  const slots = document.getElementById('inv-slots');
  slots.innerHTML = '';
  if (state.inventory.length === 0) {
    slots.innerHTML = '<div style="color:var(--text-dim);font-size:12px;padding:20px;text-align:center;width:100%;opacity:0.5">尚未获得任何物品，开始炼制吧！</div>';
    return;
  }
  state.inventory.forEach(itemId => {
    const item = CRAFTED[itemId];
    if (!item) return;
    const isDeviceNeeded = state.currentStage >= 5 && state.deviceOrder.includes(itemId) && !state.deviceSlots.includes(itemId);
    const isUsable = state.currentStage === 2 && itemId === 'glowing_solution';
    const div = document.createElement('div');
    div.className = 'inv-slot' + (isUsable ? ' usable' : '') + (isDeviceNeeded ? ' craftable' : '');
    div.innerHTML = `
      <span class="inv-icon">${item.icon}</span>
      <span class="inv-label">${item.name}</span>
      ${isDeviceNeeded ? '<span style="font-size:9px;color:var(--glow-gold);opacity:0.8">点击放入</span>' : ''}
    `;
    div.onclick = () => {
      if (state.currentStage === 2 && itemId === 'glowing_solution') {
        useInventoryItem(itemId);
      } else if (state.currentStage >= 5 && state.deviceOrder.includes(itemId)) {
        placeDeviceItem(itemId);
      } else {
        showInspect(event, item.name, item.desc);
      }
    };
    slots.appendChild(div);
  });
}

function renderStageInfo() {
  const s = STAGES[state.currentStage - 1] || STAGES[0];
  document.getElementById('stage-num').textContent = state.currentStage;
  document.getElementById('stage-name').textContent = s.name;
}

function renderCauldronContents() {
  const el = document.getElementById('contents-list');
  if (state.cauldron.contents.length === 0) {
    el.innerHTML = '<span style="opacity:0.4">空</span>';
  } else {
    el.innerHTML = state.cauldron.contents.map(c => {
      const mat = MATERIALS[c.id];
      return `<span style="color:${mat ? mat.color : '#fff'}">${mat ? mat.icon : '?'} ${c.name}</span>`;
    }).join(' → ');
  }
}

function renderAll() {
  renderMaterials();
  renderJournal();
  renderInventory();
  renderStageInfo();
  renderCauldronContents();
  updateDeviceButton();
}

let bubbleInterval = null;

function updateCauldronVisuals() {
  const liquid = document.getElementById('cauldron-liquid');
  const glow = document.getElementById('cauldron-glow');
  const fire = document.getElementById('fire-container');
  const tempLabels = ['低', '中', '高'];

  // Temperature visuals — fire intensity
  fire.classList.toggle('active', state.cauldron.temperature >= 1);
  if (state.cauldron.temperature === 2) {
    fire.style.transform = 'translateX(-50%) scale(1.2)';
    fire.style.opacity = '1';
  } else if (state.cauldron.temperature === 1) {
    fire.style.transform = 'translateX(-50%) scale(1)';
    fire.style.opacity = '1';
  }

  // Liquid color — blend based on element types + temperature
  if (state.cauldron.liquidColor) {
    liquid.style.background = state.cauldron.liquidColor;
    liquid.style.opacity = '1';
  } else if (state.cauldron.contents.length > 0) {
    // Dynamic color mixing based on elements present and temperature
    const tempKey = tempLabels[state.cauldron.temperature];
    const elements = [...new Set(state.cauldron.contents.map(c => MATERIALS[c.id]?.element).filter(Boolean))];
    if (elements.length > 0) {
      const colorParts = elements.map(e => ELEMENT_COLORS[e]?.[tempKey] || 'rgba(80,80,80,0.2)');
      liquid.style.background = `linear-gradient(135deg, ${colorParts.join(', ')}, rgba(20,15,30,0.8))`;
      liquid.style.opacity = Math.min(0.6 + elements.length * 0.1, 0.9);
    }
  } else {
    liquid.style.background = 'rgba(30,30,50,0.6)';
    liquid.style.opacity = '1';
  }

  // Glow — stronger with more materials and higher temp
  if (state.cauldron.glowColor) {
    glow.style.background = state.cauldron.glowColor;
    glow.style.width = '220px';
  } else {
    const intensity = state.cauldron.contents.length * (state.cauldron.temperature + 1) * 0.04;
    glow.style.background = `rgba(79,195,247,${Math.min(intensity, 0.3)})`;
    glow.style.width = (140 + state.cauldron.contents.length * 15) + 'px';
  }

  // Bubbles — rate depends on temperature + number of contents
  if (state.cauldron.contents.length > 0) {
    const rate = (state.cauldron.temperature + 1) * state.cauldron.contents.length;
    startBubbles(rate);
  } else {
    stopBubbles();
  }

  // Show temperature reaction text for current materials
  updateTempReaction();

  // Update stir count display
  updateStirDisplay();

  // Cauldron state overlay
  const overlay = document.getElementById('cauldron-state-overlay');
  overlay.className = '';
  if (state.cauldron.state === 'brewing') overlay.classList.add('brewing');
  if (state.cauldron.state === 'success') overlay.classList.add('success');
  if (state.cauldron.state === 'failure') overlay.classList.add('failure');
}

function stopBubbles() {
  if (bubbleInterval) { clearInterval(bubbleInterval); bubbleInterval = null; }
}

function startBubbles(rate) {
  if (bubbleInterval) clearInterval(bubbleInterval);
  const interval = Math.max(800 / (rate || 1), 80);
  bubbleInterval = setInterval(() => {
    if (state.cauldron.state === 'empty') { stopBubbles(); return; }
    spawnBubble();
  }, interval);
}

  const liquid = document.getElementById('cauldron-liquid');

// ══════════════════════════════════════════
// GAME ACTIONS
// ══════════════════════════════════════════

function selectMaterial(id) {
  if (state.cauldron.state === 'brewing') {
    showMessage('炼制进行中，无法更换材料。', 'info');
    return;
  }
  if (state.selectedMaterial === id) {
    state.selectedMaterial = null;
  } else {
    state.selectedMaterial = id;
  }
  renderMaterials();
}

function addToCauldron() {
  if (!state.selectedMaterial) {
    showMessage('请先从材料架上选择一种材料。', 'info');
    return;
  }
  if (state.cauldron.state === 'brewing') {
    showMessage('炼制进行中，无法添加材料。', 'info');
    return;
  }
  if (state.cauldron.contents.length >= 4) {
    showMessage('坩埚已满！请先清空或炼制。', 'info');
    return;
  }
  const mat = MATERIALS[state.selectedMaterial];
  const stock = state.materialStock[mat.id] || 0;
  if (stock <= 0) {
    showMessage('「' + mat.name + '」库存耗尽了！', 'failure');
    state.selectedMaterial = null;
    renderMaterials();
    return;
  }
  // Consume one unit
  state.materialStock[mat.id] = stock - 1;
  state.cauldron.contents.push({ id: mat.id, name: mat.name });
  showMessage(`已将「${mat.name}」投入坩埚。（剩余 ${stock - 1}）`, 'info');
  state.selectedMaterial = null;

  // Material drop animation
  showMaterialDrop(mat.icon);
  // Check for element conflicts
  setTimeout(() => checkElementConflicts(), 400);
  // Update liquid level visual (liquid rises as more items added)
  const liquid = document.getElementById('cauldron-liquid');
  liquid.style.height = Math.min(40 + state.cauldron.contents.length * 12, 85) + '%';

  renderMaterials();
  renderCauldronContents();
  updateCauldronVisuals();
}

function showMaterialDrop(icon) {
  const wrapper = document.getElementById('cauldron-wrapper');
  const drop = document.createElement('div');
  drop.className = 'material-drop';
  drop.textContent = icon;
  drop.style.left = (85 + Math.random() * 50) + 'px';
  drop.style.top = '40px';
  wrapper.appendChild(drop);
  setTimeout(() => drop.remove(), 900);
}

function updateTempReaction() {
  const el = document.getElementById('temp-reaction');
  if (state.cauldron.contents.length === 0) {
    el.classList.remove('visible');
    return;
  }
  const tempLabels = ['low', 'medium', 'high'];
  const tempKey = tempLabels[state.cauldron.temperature];
  const lastMat = state.cauldron.contents[state.cauldron.contents.length - 1];
  const element = MATERIALS[lastMat.id]?.element;
  if (element && ELEMENT_TEMP_REACTIONS[element]) {
    el.textContent = ELEMENT_TEMP_REACTIONS[element][tempKey];
    el.classList.add('visible');
    // Color based on temperature
    const colors = ['#4fc3f7', '#ffd54f', '#ef5350'];
    el.style.color = colors[state.cauldron.temperature];
  }
}

function updateStirDisplay() {
  const el = document.getElementById('stir-count');
  if (state.cauldron.stirCount > 0) {
    el.textContent = '🌀 搅拌次数: ' + state.cauldron.stirCount;
  } else {
    el.textContent = '';
  }
}

function checkElementConflicts() {
  if (state.cauldron.contents.length < 2) return;
  const now = Date.now();
  const elements = state.cauldron.contents.map(c => MATERIALS[c.id]?.element).filter(Boolean);
  const uniqueElems = [...new Set(elements)];

  for (const conflict of ELEMENT_CONFLICTS) {
    if (uniqueElems.includes(conflict.elems[0]) && uniqueElems.includes(conflict.elems[1])) {
      if (conflict.temp !== undefined && conflict.temp !== state.cauldron.temperature) continue;
      const key = conflict.elems.sort().join('+');
      if (state.conflictCooldown[key] && now - state.conflictCooldown[key] < 3000) continue;
      state.conflictCooldown[key] = now;
      showMessage(conflict.msg, 'hint');
      if (conflict.effect === 'fizz') showFizzEffect();
      if (conflict.effect === 'steam') showSteamEffect();
      break; // only one conflict at a time
    }
  }
}

function showFizzEffect() {

  for (let i = 0; i < 8; i++) {

function showSteamEffect() {

function adjustTemp(delta) {
  if (state.cauldron.state === 'brewing') {
    showMessage('炼制中无法调节温度。', 'info');
    return;
  }
  const t = state.cauldron.temperature;
  const newVal = Math.max(0, Math.min(2, t + delta));
  if (newVal === t) return;
  state.cauldron.temperature = newVal;
  const labels = ['低', '中', '高'];
  const colors = ['#4fc3f7', '#ffd54f', '#ef5350'];
  document.getElementById('temp-val').textContent = labels[newVal];
  document.getElementById('temp-val').style.color = colors[newVal];

  // Temperature change visual feedback
  if (state.cauldron.contents.length > 0) {
    if (delta > 0) {
      showMessage('🔥 温度升至 ' + labels[newVal], 'info');
    } else {
      showMessage('❄ 温度降至 ' + labels[newVal], 'info');
    }
    checkElementConflicts();
  }
  updateCauldronVisuals();
}

function stirCauldron() {
  if (state.cauldron.contents.length === 0) {
    showMessage('坩埚里没有什么可搅拌的。', 'info');
    return;
  }
  if (state.cauldron.state === 'brewing') {
    showMessage('炼制中无需搅拌。', 'info');
    return;
  }
  state.cauldron.stirCount++;
  const ind = document.getElementById('stir-indicator');
  ind.classList.remove('stirring');
  void ind.offsetWidth;
  ind.classList.add('stirring');
  setTimeout(() => ind.classList.remove('stirring'), 1300);

  const count = state.cauldron.stirCount;
  if (count === 1) {
    showMessage('你轻轻搅拌了坩埚……', 'info');
  } else if (count === 2) {
    showMessage('你再次搅拌，液体开始旋转……', 'info');
  } else if (count === 3) {
    showMessage('液体剧烈旋转，漩涡形成！', 'hint');
    // Extra visual: brief whirlpool effect
    const liquid = document.getElementById('cauldron-liquid');
    liquid.style.transition = 'transform 0.5s';
    liquid.style.transform = 'rotate(5deg)';
    setTimeout(() => { liquid.style.transform = 'rotate(0deg)'; }, 500);
  } else {
    showMessage('搅拌了 ' + count + ' 次……液体似乎过度混乱了。', 'info');
  }
  updateStirDisplay();
}

function brew() {
  if (state.currentStage === 2) {
    showMessage('现在不是炼制的时候……试试点击背包中的荧光溶液？', 'hint');
    return;
  }
  if (state.cauldron.contents.length === 0) {
    showMessage('坩埚是空的。请先投入材料。', 'info');
    return;
  }
  if (state.cauldron.state === 'brewing') {
    showMessage('炼制已在进行中……请耐心等待。', 'info');
    return;
  }
  state.cauldron.state = 'brewing';

  // Disable controls during brewing
  document.getElementById('btn-add').disabled = true;
  document.getElementById('btn-brew').disabled = true;

  // Find matching recipe
  const recipe = findMatchingRecipe();
  const brewTime = recipe ? (recipe.brewTime || 2500) : 2000;

  // Start brew progress bar
  runBrewProgress(brewTime);

  if (recipe) {
    // Success!
    setTimeout(() => {
      state.cauldron.state = 'success';
      state.cauldron.liquidColor = recipe.liquidColor;
      state.cauldron.glowColor = recipe.glowColor;
      updateCauldronVisuals();
      showSuccessEffect(recipe.liquidColor.match(/[\w#]+/g)[1] || '#ffd54f');
      showMessage(recipe.successMsg, 'success');

      // Add to inventory if not already there
      if (!state.inventory.includes(recipe.result)) {
        state.inventory.push(recipe.result);
      }
      renderInventory();

      // Re-enable controls
      document.getElementById('btn-add').disabled = false;
      document.getElementById('btn-brew').disabled = false;

      // Check stage progression
      setTimeout(() => checkStageProgress(recipe), 800);
    }, brewTime);
  } else {
    // Failure
    setTimeout(() => {
      state.cauldron.state = 'failure';
      showExplosion();
      showSmoke();
      showMessage(findFailReason() || '实验失败了。混合物极不稳定。', 'failure');
      // Re-enable controls
      document.getElementById('btn-add').disabled = false;
      document.getElementById('btn-brew').disabled = false;
      // Reset after delay
      setTimeout(() => {
        resetCauldronVisuals();
      }, 2000);
    }, brewTime);
  }
}

function runBrewProgress(duration) {
  const bar = document.getElementById('brew-progress');
  const fill = document.getElementById('brew-progress-bar');
  bar.classList.add('active');
  fill.style.width = '0%';
  fill.style.transition = 'none';

  // Force reflow
  void fill.offsetWidth;
  fill.style.transition = `width ${duration}ms linear`;
  fill.style.width = '100%';

  setTimeout(() => {
    bar.classList.remove('active');
    fill.style.width = '0%';
  }, duration + 200);
}

function findMatchingRecipe() {
  return RECIPES.find(r => {
    if (r.stage > state.currentStage) return false;
    // Check ingredients
    const cauldronIds = state.cauldron.contents.map(c => c.id);
    const recipeIds = r.ingredients.map(i => i[0]);
    if (cauldronIds.length !== recipeIds.length) return false;
    // Same items (order independent for ingredients)
    for (const rid of recipeIds) {
      if (!cauldronIds.includes(rid)) return false;
    }
    // Check sequence
    for (let i = 0; i < r.sequence.length; i++) {
      if (cauldronIds[i] !== r.sequence[i]) return false;
    }
    // Check temperature
    if (state.cauldron.temperature !== r.temp) return false;
    // Check stir count (within allowed range)
    const stirs = state.cauldron.stirCount;
    if (stirs < r.stirMin || stirs > r.stirMax) return false;
    return true;
  });
}

function findFailReason() {
  const cauldronIds = state.cauldron.contents.map(c => c.id);
  // Check if ingredients match any recipe but conditions are wrong
  const partial = RECIPES.find(r => {
    if (r.stage > state.currentStage) return false;
    const recipeIds = r.ingredients.map(i => i[0]);
    if (cauldronIds.length !== recipeIds.length) return false;
    for (const rid of recipeIds) {
      if (!cauldronIds.includes(rid)) return false;
    }
    return true; // ingredients match but something else is wrong
  });
  if (partial) {
    const reasons = [];
    // Check sequence
    const seq = partial.sequence;
    let seqOk = true;
    for (let i = 0; i < seq.length; i++) {
      if (cauldronIds[i] !== seq[i]) { seqOk = false; break; }
    }
    if (!seqOk) reasons.push('材料的投入顺序');
    if (state.cauldron.temperature !== partial.temp)
      reasons.push('温度设定');
    // Check stir count
    const stirs = state.cauldron.stirCount;
    if (stirs < partial.stirMin) {
      if (partial.stirMin === 0) reasons.push('不应搅拌');
      else reasons.push('需要搅拌' + partial.stirMin + '次');
    } else if (stirs > partial.stirMax) {
      reasons.push('搅拌过多（最多' + partial.stirMax + '次）');
    }
    if (reasons.length > 0) {
      return '就差一点！请检查' + reasons.join('和') + '。';
    }
  }
  // Ingredients don't match any recipe — guide player to journal
  return '材料组合不正确。请查阅右侧手札获取配方线索。';
}

function clearCauldron() {
  resetCauldronState();
  showMessage('坩埚已清空。', 'info');
}

function resetCauldronState() {
  state.cauldron.contents = [];
  state.cauldron.temperature = 0;
  state.cauldron.stirCount = 0;
  state.cauldron.state = 'empty';
  state.cauldron.liquidColor = null;
  state.cauldron.glowColor = null;
  if (state.brewTimer) { clearTimeout(state.brewTimer); state.brewTimer = null; }
  document.getElementById('temp-val').textContent = '低';
  document.getElementById('temp-val').style.color = '#4fc3f7';
  document.getElementById('btn-add').disabled = false;
  document.getElementById('btn-brew').disabled = false;
  document.getElementById('brew-progress').classList.remove('active');
  document.getElementById('cauldron-liquid').style.height = '70%';
  document.getElementById('temp-reaction').classList.remove('visible');
  renderCauldronContents();
  updateStirDisplay();
  resetCauldronVisuals();
}

function resetCauldronVisuals() {
  const liquid = document.getElementById('cauldron-liquid');
  liquid.style.background = 'rgba(30,30,50,0.6)';
  liquid.style.opacity = '1';
  liquid.style.height = '70%';
  liquid.style.transition = 'background 1.5s ease, box-shadow 1.5s ease, height 0.5s ease';
  document.getElementById('cauldron-glow').style.background = 'rgba(79,195,247,0.08)';
  document.getElementById('cauldron-glow').style.width = '160px';
  document.getElementById('fire-container').classList.remove('active');
  document.getElementById('fire-container').style.transform = '';
  document.getElementById('fire-container').style.opacity = '';
  document.getElementById('cauldron-state-overlay').className = '';
  stopBubbles();
  state.cauldron.liquidColor = null;
  state.cauldron.glowColor = null;
}

function resetCauldron() {
  resetCauldronState();
}

// ══════════════════════════════════════════
// STAGE PROGRESSION
// ══════════════════════════════════════════

function checkStageProgress(recipe) {
  const currentStage = state.currentStage;

  if (currentStage === 1 && recipe.result === 'glowing_solution') {
    state.stageCompleted[1] = true;
    setTimeout(() => {
      showMessage('柔和的光芒充满工坊。古老的符文似乎在墙壁上隐隐闪烁……', 'hint');
      unlockJournal([1, 2]);
      // Auto-transition to Stage 2
      setTimeout(() => showStageTransition(2), 1500);
    }, 1000);
  }
  else if (currentStage === 3) {
    // Show targeted follow-up hints after crafting each item
    if (recipe.result === 'purified_salt') {
      setTimeout(() => showMessage('净化之盐已入库！还需炼制：烈焰灵药、虚空墨水。', 'hint'), 1200);
    }
    if (recipe.result === 'flame_elixir') {
      setTimeout(() => showMessage('烈焰灵药已入库！还需炼制：虚空墨水。', 'hint'), 1200);
    }
    if (recipe.result === 'void_ink') {
      setTimeout(() => showMessage('虚空墨水已入库！三种中级成品全部完成！', 'hint'), 1200);
    }
    // Check if all stage 3 recipes are crafted
    const stage3Items = ['purified_salt', 'flame_elixir', 'void_ink'];
    const allCrafted = stage3Items.every(i => state.inventory.includes(i));
    if (allCrafted && !state.stageCompleted[3]) {
      state.stageCompleted[3] = true;
      setTimeout(() => {
        showMessage('你已精通中级炼金术。更高阶的配方正等待着！', 'success');
        setTimeout(() => showStageTransition(4), 1500);
      }, 1000);
    }
  }
  else if (currentStage === 4) {
    if (recipe.result === 'aurora_powder') {
      setTimeout(() => showMessage('极光之粉已入库！还需炼制：时之滴露。', 'hint'), 1200);
    }
    if (recipe.result === 'chronos_droplet') {
      setTimeout(() => showMessage('时之滴露已入库！两种高阶成品全部完成！', 'hint'), 1200);
    }
    const stage4Items = ['aurora_powder', 'chronos_droplet'];
    const allCrafted = stage4Items.every(i => state.inventory.includes(i));
    if (allCrafted && !state.stageCompleted[4]) {
      state.stageCompleted[4] = true;
      setTimeout(() => {
        unlockJournal([10]);
        showMessage('最终阶段降临。远古装置已然可以激活！', 'success');
        setTimeout(() => showStageTransition(5), 1500);
      }, 1000);
    }
  }
}

// ── Stage 2: Use glowing_solution from inventory ──

function useInventoryItem(itemId) {
  if (state.currentStage !== 2) return;
  if (itemId !== 'glowing_solution') {
    showMessage('这个物品现在无法使用。', 'info');
    return;
  }
  // Trigger the symbol reveal sequence
  showMessage('你将荧光溶液泼洒向墙壁……', 'hint');
  setTimeout(() => {
    revealSymbols();
  }, 1200);
  setTimeout(() => {
    showMessage('符文揭示了隐藏材料的所在！新物品已解锁。', 'success');
    unlockJournal([3]);
    // Unlock new materials
    ['shadow_extract', 'starlight_dew', 'phoenix_tear'].forEach(m => {
      if (!state.unlockedMaterials.includes(m)) state.unlockedMaterials.push(m);
    });
    // Replenish some stock for new materials
    state.materialStock['shadow_extract'] = (state.materialStock['shadow_extract'] || 0) + 5;
    state.materialStock['starlight_dew'] = (state.materialStock['starlight_dew'] || 0) + 4;
    state.materialStock['phoenix_tear'] = (state.materialStock['phoenix_tear'] || 0) + 3;
    unlockJournal([4]);
    renderMaterials();
    state.stageCompleted[2] = true;
    // Mark glowing_solution as used (not consumed, but visually mark)
    setTimeout(() => showStageTransition(3), 2500);
  }, 5000);
}

// ── Stage Transition System ──

function showStageTransition(stageId) {
  const stage = STAGES[stageId - 1];
  if (!stage) return;

  const overlay = document.getElementById('stage-transition');
  document.getElementById('st-icon').textContent = stage.icon;
  document.getElementById('st-num-text').textContent = '第 ' + stage.id + ' 阶段';
  document.getElementById('st-title').textContent = stage.name;
  document.getElementById('st-desc').textContent = stage.desc;

  overlay.classList.remove('fade-out');
  overlay.classList.add('active');
  // Force reflow for animation
  void overlay.offsetWidth;
}

function dismissStageTransition() {
  const overlay = document.getElementById('stage-transition');
  overlay.classList.add('fade-out');
  setTimeout(() => {
    overlay.classList.remove('active', 'fade-out');
    // Actually advance the stage after dismissal
    const nextId = parseInt(document.getElementById('st-num-text').textContent.match(/\d+/)[0]);
    advanceToStage(nextId);
    // Clear cauldron on stage advance
    resetCauldron();
  }, 600);
}

function advanceToStage(newStage) {
  state.currentStage = newStage;

  // Stage-specific unlock & hint messages
  if (newStage === 3) {
    // Immediately reveal all three Stage 3 recipe entries so players aren't stuck
    unlockJournal([5, 6, 7]);
    setTimeout(() => showMessage('新配方已记录在手札中——查阅右侧手札获取炼制线索！', 'hint'), 800);
  }
  if (newStage === 4) {
    unlockJournal([8, 9]);
    setTimeout(() => showMessage('高阶配方已在手札中揭示，注意材料顺序与温度！', 'hint'), 800);
  }

  renderStageInfo();
  renderJournal();
  renderMaterials();
  updateDeviceButton();
  updateStageObjective();
  showMessage('第 ' + newStage + ' 阶段开始：' + STAGES[newStage - 1].name, 'info');
}

// ── Stage Objective Bar ──

function updateStageObjective() {
  const bar = document.getElementById('stage-objective');
  const stage = STAGES[state.currentStage - 1];
  if (!stage || !stage.objective) {
    bar.classList.remove('active');
    return;
  }
  bar.innerHTML = '<span class="obj-icon">' + stage.icon + '</span>' + stage.objective;
  bar.classList.add('active');
}

function unlockJournal(indices) {
  indices.forEach(i => {
    if (!state.journalUnlocked.includes(i)) state.journalUnlocked.push(i);
  });
  renderJournal();
}

// ══════════════════════════════════════════

function revealSymbols() {
  const overlay = document.getElementById('symbols-overlay');
  overlay.classList.add('active');
  const symbols = ['☽', '☀', '⚗', '⊛', '✦', 'ᛟ', '⟡'];
  const positions = [
    {top:'15%',left:'20%'}, {top:'25%',left:'70%'}, {top:'60%',left:'15%'},
    {top:'50%',left:'80%'}, {top:'80%',left:'30%'}, {top:'70%',left:'65%'},
    {top:'35%',left:'45%'}
  ];
  positions.forEach((pos, i) => {
    const el = document.createElement('div');
    el.className = 'hidden-symbol';
    el.textContent = symbols[i];
    el.style.top = pos.top;
    el.style.left = pos.left;
    el.style.animationDelay = (i * 0.4) + 's';
    overlay.appendChild(el);
    setTimeout(() => el.remove(), 4000 + i * 400);
  });
  setTimeout(() => overlay.classList.remove('active'), 6000);
}

function updateDeviceButton() {
  // Show/hide the embedded device area and hide/show cauldron area
  const deviceArea = document.getElementById('device-area');
  const cauldronArea = document.getElementById('cauldron-area');
  const controls = document.getElementById('controls');
  const contentsList = document.getElementById('contents-list');
  const stirCount = document.getElementById('stir-count');
  const tempReaction = document.getElementById('temp-reaction');
  const resetBtn = document.getElementById('reset-btn');

  if (state.currentStage >= 5) {
    deviceArea.classList.add('active');
    cauldronArea.style.display = 'none';
    controls.style.display = 'none';
    contentsList.style.display = 'none';
    stirCount.style.display = 'none';
    tempReaction.style.display = 'none';
    resetBtn.style.display = 'none';
    refreshDeviceUI();
  } else {
    deviceArea.classList.remove('active');
    cauldronArea.style.display = '';
    controls.style.display = '';
    contentsList.style.display = '';
    stirCount.style.display = '';
    tempReaction.style.display = '';
    resetBtn.style.display = '';
  }
}

// Place an inventory item into the next empty slot (called from inventory click)
function placeDeviceItem(itemId) {
  if (state.currentStage < 5) return;
  if (state.gameWon) return;
  if (!state.deviceOrder.includes(itemId)) {
    showMessage('这个物品不需要放入装置。', 'info');
    return;
  }
  if (state.deviceSlots.includes(itemId)) {
    showMessage('这个物品已经在装置中了。', 'info');
    return;
  }
  // Find first empty slot
  const emptyIdx = state.deviceSlots.indexOf(null);
  if (emptyIdx === -1) {
    showMessage('所有槽位已满。点击槽位可以取出物品。', 'info');
    return;
  }
  state.deviceSlots[emptyIdx] = itemId;
  const item = CRAFTED[itemId];
  showMessage('已将「' + item.name + '」放入槽位 ' + (emptyIdx + 1), 'success');
  refreshDeviceUI();
}

// Click a slot to remove its item (allows reordering)
function toggleDeviceSlot(slotIndex) {
  if (state.currentStage < 5 || state.gameWon) return;
  if (state.deviceSlots[slotIndex]) {
    const removed = state.deviceSlots[slotIndex];
    state.deviceSlots[slotIndex] = null;
    showMessage('已取出「' + CRAFTED[removed].name + '」', 'info');
    refreshDeviceUI();
  }
}

function refreshDeviceUI() {
  // Update inline slot visuals
  state.deviceSlots.forEach((itemId, i) => {
    const slot = document.getElementById('dslot-' + i);
    if (itemId) {
      const item = CRAFTED[itemId];
      slot.classList.add('filled');
      slot.innerHTML = `<span class="slot-num">槽 ${i+1}</span><span class="slot-icon">${item.icon}</span><span class="slot-name">${item.name}</span>`;
    } else {
      slot.classList.remove('filled');
      slot.innerHTML = `<span class="slot-num">槽 ${i+1}</span><span class="slot-icon">—</span><span class="slot-name">空</span>`;
    }
  });

  // Rings light up
  const filled = state.deviceSlots.filter(s => s !== null).length;
  document.getElementById('dr1').classList.toggle('lit', filled >= 1);
  document.getElementById('dr2').classList.toggle('lit', filled >= 2);
  document.getElementById('dr3').classList.toggle('lit', filled >= 3);
  document.getElementById('dr4').classList.toggle('lit', filled >= 4);

  // Status message
  const status = document.getElementById('device-status-embed');
  if (filled >= 4) {
    const correct = state.deviceSlots.every((s, i) => s === state.deviceOrder[i]);
    if (correct) {
      status.textContent = '✦ 装置发出共鸣之力！✦';
      status.style.color = '#ffd54f';
      if (!state.stageCompleted[5]) {
        setTimeout(() => triggerVictory(), 1500);
      }
    } else {
      status.textContent = '装置在嗡鸣……但排列似乎不对。点击槽位可以取出物品重新排列。';
      status.style.color = '#ef5350';
    }
  } else {
    status.textContent = '点击下方背包中发光的炼成品，直接放入装置。还需 ' + (4 - filled) + ' 个。';
    status.style.color = '#c9a84c';
  }

  // Re-render inventory to update usable glow
  renderInventory();
}

function triggerVictory() {
  state.stageCompleted[5] = true;
  state.gameWon = true;
  showMessage('装置开始剧烈震动……', 'hint');
  setTimeout(() => {
    showMessage('光芒从装置中心喷涌而出！', 'success');
  }, 2000);
  setTimeout(() => {
    document.getElementById('victory-overlay').classList.add('active');
    spawnVictoryParticles();
  }, 4000);
}

function spawnVictoryParticles() {
  const overlay = document.getElementById('victory-overlay');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'explosion-particle';
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 200;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    const colors = ['#ffd54f','#ce93d8','#4fc3f7','#81c784','#ff8a65','#ef5350'];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = '50%';
    p.style.top = '45%';
    p.style.width = (4 + Math.random() * 8) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    overlay.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// ══════════════════════════════════════════
// MESSAGES
// ══════════════════════════════════════════

function showMessage(text, type) {
  const area = document.getElementById('message-area');
  const msg = document.createElement('div');
  msg.className = 'game-message ' + type;
  msg.textContent = text;
  area.appendChild(msg);
  setTimeout(() => msg.remove(), 4200);
}

// ══════════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════════

function showInspect(e, name, desc) {
  const tip = document.getElementById('inspect-tooltip');
  tip.querySelector('.tip-name').textContent = name;
  tip.querySelector('.tip-desc').textContent = desc;
  tip.style.display = 'block';
  tip.style.left = Math.min(e.clientX + 10, window.innerWidth - 240) + 'px';
  tip.style.top = Math.min(e.clientY + 10, window.innerHeight - 100) + 'px';
  setTimeout(() => tip.style.display = 'none', 2500);
}

document.addEventListener('click', () => {
  document.getElementById('inspect-tooltip').style.display = 'none';
});

// ══════════════════════════════════════════
// DUST PARTICLES (background ambiance)
// ══════════════════════════════════════════

function initDust() {
  const canvas = document.getElementById('dust-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  const particles = [];
  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 0.5 + Math.random() * 1.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: -0.1 - Math.random() * 0.3,
      opacity: 0.1 + Math.random() * 0.3,
    });
  }
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${p.opacity})`;
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
      if (p.x < -5) p.x = canvas.width + 5;
      if (p.x > canvas.width + 5) p.x = -5;
    });
    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener('resize', () => {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  });
}

// ══════════════════════════════════════════
// INIT & RESTART
// ══════════════════════════════════════════

function restartGame() {
  // Reset all state
  state.currentStage = 1;
  state.unlockedMaterials = ['water_essence','ash_powder','ember_dust','air_crystal','crystal_dust','metal_fragment'];
  state.inventory = [];
  state.materialStock = {};
  Object.keys(INITIAL_STOCK).forEach(k => state.materialStock[k] = INITIAL_STOCK[k]);
  state.selectedMaterial = null;
  state.journalUnlocked = [0];
  state.deviceSlots = [null,null,null,null];
  state.gameWon = false;
  state.brewTimer = null;
  state.conflictCooldown = {};
  state.stageCompleted = {};

  resetCauldronState();
  document.getElementById('victory-overlay').classList.remove('active');
  renderAll();
  updateDeviceButton();
  updateStageObjective();

  setTimeout(() => {
    showMessage('Tech工坊已重置。一切从头开始。', 'hint');
  }, 500);
}

function init() {
  renderAll();
  initDust();
  updateDeviceButton();
  updateStageObjective();
  // Show welcome
  setTimeout(() => {
    showMessage('欢迎来到Tech工坊。炼金术士已离去，接下来的使命属于你。', 'hint');
  }, 500);
  setTimeout(() => {
    showMessage('阅读右侧手札获取指引。从材料架选取材料并投入坩埚。', 'info');
  }, 2500);
}

document.addEventListener('DOMContentLoaded', init);
</script>
